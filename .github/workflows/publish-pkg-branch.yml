name: Publish pkg branch

# Mirrors packages/themes (with a freshly built dist) to the `pkg` branch so
# consumer repos can install it via `github:iPior/custom-tailwind-shadcn-themes#pkg`.
# pnpm/npm git deps can't target a subdirectory, hence this published-subtree branch.
on:
  push:
    branches: [main]
    paths:
      - 'packages/themes/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pkg
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build themes package
        run: pnpm --filter @ipior/custom-tailwind-shadcn-themes build

      - name: Publish packages/themes to pkg branch
        run: |
          cd packages/themes
          rm -rf .git
          git init -q
          git checkout -q -b pkg
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='github-actions[bot]@users.noreply.github.com' \
              commit -qm "Publish from ${GITHUB_SHA}"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            pkg
